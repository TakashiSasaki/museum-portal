<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愛媛大学ミュージアム 宇宙ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <link rel="canonical" href="https://museum-portal.moukaeritai.work/" />
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="index.css">
</head>
<body class="p-0 m-0 h-[100dvh] flex flex-col items-center relative overflow-hidden">

    <div class="nebula-layer"></div>
    <div class="star-dust"></div>

    <!-- Header Area: 位置関係を元の状態 (1_English 2_Japanese 3_Slogan) へ復元 -->
    <header class="w-full max-w-md landscape:max-w-4xl sm:max-w-xl md:max-w-4xl px-2 sm:px-4 text-center mb-2 sm:mb-3 mt-2 landscape:mb-2 landscape:mt-1 relative z-10 flex-shrink-0">
        <!-- 1. EHIME UNIVERSITY MUSEUM (英字タイトル・ゴールド) -->
        <div class="flex justify-center items-center gap-1 sm:gap-3 mb-1 sm:mb-4 opacity-90">
            <span class="h-[1px] w-6 sm:w-8 bg-gradient-to-r from-transparent to-[#b1a348]"></span>
            <span class="text-[10px] sm:text-[12px] font-bold text-[#b1a348] tracking-[0.2em] sm:tracking-[0.4em] uppercase drop-shadow-[0_0_8px_rgba(177,163,72,0.4)]">
                Ehime University Museum
            </span>
            <span class="h-[1px] w-6 sm:w-8 bg-gradient-to-l from-transparent to-[#b1a348]"></span>
        </div>

        <!-- 2. ミュージアム・ポータル (日本語メインタイトル) -->
        <h1 class="text-lg sm:text-3xl font-bold tracking-normal sm:tracking-[0.2em] whitespace-nowrap text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">
            ミュージアム・ポータル
        </h1>

        <!-- 3. 果てしなき知の探求、その入り口。 (スローガン・シアン) -->
        <p class="text-[10px] sm:text-[14px] mt-1 sm:mt-4 font-light text-cyan-300 tracking-normal sm:tracking-[0.15em] drop-shadow-[0_0_8px_rgba(103,232,249,0.3)] opacity-95 whitespace-nowrap slogan-text">
            果てしなき知の探求、その入り口。
        </p>
    </header>

    <!-- Main Grid (Portrait: 2x4, Landscape: 4x2) -->
    <main class="w-full max-w-md landscape:max-w-4xl sm:max-w-xl md:max-w-4xl px-4 grid grid-cols-2 landscape:grid-cols-4 sm:grid-cols-4 gap-3 relative z-10 flex-1 min-h-0" id="portal-grid">
        
        <!-- 1. えひめ連携企業紹介 -->
        <a href="#" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-cyan-400">
            <div class="plasma-sphere bg-gradient-to-br from-cyan-500 to-cyan-700 mb-2 sm:mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="handshake" aria-hidden="true" class="lucide lucide-handshake text-white icon-glow"><path d="m11 17 2 2a1 1 0 1 0 3-3"></path><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"></path><path d="m21 3 1 11h-2"></path><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"></path><path d="M3 4h8"></path></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">えひめ連携企業紹介</span>
        </a>

        <!-- 2. 松山ミュージアムストリート -->
        <a href="/museum-street/" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-emerald-400">
            <div class="plasma-sphere bg-gradient-to-br from-emerald-500 to-emerald-800 mb-2 sm:mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="map-pin" aria-hidden="true" class="lucide lucide-map-pin text-white icon-glow"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">松山ミュージアム<br>ストリート</span>
        </a>

        <!-- 3. 愛媛大学ミュージアム -->
        <a href="#" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-yellow-400">
            <div class="plasma-sphere bg-gradient-to-br from-yellow-400 to-yellow-600 mb-2 sm:mb-4">
                <svg viewBox="0 0 100 100" class="text-white icon-glow" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 10,18 Q 30,38 52,38"></path>
                    <path d="M 10,38 Q 28,56 48,56"></path>
                    <path d="M 52,49 L 57,41 L 62,48 L 71,32 L 78,40 L 88,27"></path>
                    <path d="M 10,58 C 30,84 68,84 88,56"></path>
                </svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">愛媛大学<br>ミュージアム</span>
        </a>

        <!-- 4. イマジン・デッキ -->
        <a href="#" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-fuchsia-400">
            <div class="plasma-sphere bg-gradient-to-br from-fuchsia-500 to-purple-700 mb-2 sm:mb-4">
                <svg viewBox="5 5 90 90" class="text-white icon-glow" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="15,55 50,75 85,55 50,35" stroke-width="5"></polygon>
                    <line x1="50" y1="55" x2="82" y2="23" stroke-width="7"></line>
                    <circle cx="50" cy="55" r="7" fill="currentColor" stroke-width="0"></circle>
                    <polygon points="86,18 63,18 86,41" fill="currentColor" stroke-width="1"></polygon>
                </svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">イマジン・デッキ</span>
        </a>

        <!-- 5. 愛媛大学の学生生活サポート -->
        <a href="#" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-rose-500">
            <div class="plasma-sphere bg-gradient-to-br from-rose-500 to-rose-800 mb-2 sm:mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="heart-handshake" aria-hidden="true" class="lucide lucide-heart-handshake text-white icon-glow"><path d="M19.414 14.414C21 12.828 22 11.5 22 9.5a5.5 5.5 0 0 0-9.591-3.676.6.6 0 0 1-.818.001A5.5 5.5 0 0 0 2 9.5c0 2.3 1.5 4 3 5.5l5.535 5.362a2 2 0 0 0 2.879.052 2.12 2.12 0 0 0-.004-3 2.124 2.124 0 1 0 3-3 2.124 2.124 0 0 0 3.004 0 2 2 0 0 0 0-2.828l-1.881-1.882a2.41 2.41 0 0 0-3.409 0l-1.71 1.71a2 2 0 0 1-2.828 0 2 2 0 0 1 0-2.828l2.823-2.762"></path></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">学生生活<br>サポート</span>
        </a>

        <!-- 6. 大学生協サイト -->
        <a href="#" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-orange-500">
            <div class="plasma-sphere bg-gradient-to-br from-orange-500 to-orange-700 mb-2 sm:mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="shopping-cart" aria-hidden="true" class="lucide lucide-shopping-cart text-white icon-glow"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">大学生協<br>サイト</span>
        </a>

        <!-- 7. 愛媛大学修学支援システム -->
        <a href="#" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-blue-500">
            <div class="plasma-sphere bg-gradient-to-br from-blue-500 to-blue-800 mb-2 sm:mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="graduation-cap" aria-hidden="true" class="lucide lucide-graduation-cap text-white icon-glow"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"></path><path d="M22 10v6"></path><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">修学支援<br>システム</span>
        </a>

        <!-- 8. 問い合わせ先 -->
        <a href="#" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-indigo-400">
            <div class="plasma-sphere bg-gradient-to-br from-indigo-500 to-indigo-800 mb-2 sm:mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="mail" aria-hidden="true" class="lucide lucide-mail text-white icon-glow"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path><rect x="2" y="4" width="20" height="16" rx="2"></rect></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">問い合わせ先</span>
        </a>

    </main>

    <!-- Footer Area -->
    <footer class="mt-2 mb-2 text-center relative z-10 flex-shrink-0">
        <div class="inline-block py-2 rounded-full bg-slate-900/50 border border-slate-700/50 backdrop-blur-md">
            <p class="text-[9px] tracking-[0.4em] font-light text-slate-400 uppercase">Knowledge Portal // Ehime Univ. Museum</p>
        </div>
    </footer>

    <script src="index.js" defer></script>
</body>
</html>
