<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愛媛大学ミュージアム 宇宙ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <link rel="canonical" href="https://museum-portal.moukaeritai.work/" />
    <link rel="manifest" href="manifest.json">

    <!-- Apple (Safari) Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="愛大ミュージアム">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">

    <link rel="stylesheet" href="index.css">

    <!-- Firebase SDK -->
    <script src="/__/firebase/8.10.1/firebase-app.js"></script>
    <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/init.js"></script>
</head>
<body class="p-0 m-0 h-[100dvh] flex flex-col items-center relative overflow-hidden">

    <div class="nebula-layer"></div>
    <div class="star-dust"></div>

    <!-- Header Area: 位置関係を元の状態 (1_English 2_Japanese 3_Slogan) へ復元 -->
    <header class="w-full max-w-md landscape:max-w-4xl sm:max-w-xl md:max-w-4xl px-2 sm:px-4 text-center mb-2 sm:mb-3 mt-2 landscape:mb-2 landscape:mt-1 relative z-10 flex-shrink-0">
        <!-- 1. EHIME UNIVERSITY MUSEUM (英字タイトル・ゴールド) -->
        <div class="flex justify-center items-center gap-1 sm:gap-3 mb-1 sm:mb-4 opacity-90">
            <span class="h-[1px] w-6 sm:w-8 bg-gradient-to-r from-transparent to-[#b1a348]"></span>
            <span class="text-[10px] sm:text-[12px] font-bold text-[#b1a348] tracking-[0.2em] sm:tracking-[0.4em] uppercase drop-shadow-[0_0_8px_rgba(177,163,72,0.4)]">
                Ehime University Museum
            </span>
            <span class="h-[1px] w-6 sm:w-8 bg-gradient-to-l from-transparent to-[#b1a348]"></span>
        </div>

        <!-- 2. ミュージアム・ポータル (日本語メインタイトル) -->
        <h1 class="text-lg sm:text-3xl font-bold tracking-normal sm:tracking-[0.2em] whitespace-nowrap text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">
            ミュージアム・ポータル
        </h1>

        <!-- 3. 果てしなき知の探求、その入り口。 (スローガン・シアン) -->
        <p class="text-[10px] sm:text-[14px] mt-1 sm:mt-4 font-light text-cyan-300 tracking-normal sm:tracking-[0.15em] drop-shadow-[0_0_8px_rgba(103,232,249,0.3)] opacity-95 whitespace-nowrap slogan-text">
            果てしなき知の探求、その入り口。
        </p>
    </header>

    <!-- Main Grid (Portrait: 2x4, Landscape: 4x2) -->
    <main class="w-full max-w-md landscape:max-w-4xl sm:max-w-xl md:max-w-4xl px-4 grid grid-cols-2 landscape:grid-cols-4 sm:grid-cols-4 gap-3 relative z-10 flex-1 min-h-0" id="portal-grid">
        
        <!-- 1. えひめ連携企業紹介 -->
        <a href="#" data-page="card1" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">えひめ連携企業紹介</span>
        </a>

        <!-- 2. 松山ミュージアムストリート -->
        <a href="/museum-street/" data-page="card2" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">松山ミュージアム<br>ストリート</span>
        </a>

        <!-- 3. 愛媛大学ミュージアム -->
        <a href="#" data-page="card3" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">愛媛大学<br>ミュージアム</span>
        </a>

        <!-- 4. イマジン・デッキ -->
        <a href="#" data-page="card4" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">イマジン・デッキ</span>
        </a>

        <!-- 5. 愛媛大学の学生生活サポート -->
        <a href="#" data-page="card5" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">学生生活<br>サポート</span>
        </a>

        <!-- 6. 大学生協サイト -->
        <a href="#" data-page="card6" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">大学生協<br>サイト</span>
        </a>

        <!-- 7. 愛媛大学修学支援システム -->
        <a href="#" data-page="card7" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">修学支援<br>システム</span>
        </a>

        <!-- 8. 問い合わせ先 -->
        <a href="#" data-page="card8" class="cosmic-card p-3 sm:p-6 flex flex-col items-center justify-center text-center group text-slate-500 default-text-color">
            <div class="plasma-sphere bg-slate-500 mb-2 sm:mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            </div>
            <span class="text-[13px] font-medium text-slate-200 leading-tight tracking-wide">問い合わせ先</span>
        </a>

    </main>

    <!-- Footer Area -->
    <footer id="footer-trigger" class="mt-2 mb-2 text-center relative z-10 flex-shrink-0 select-none cursor-default">
        <div class="inline-block py-2 rounded-full bg-slate-900/50 border border-slate-700/50 backdrop-blur-md">
            <p class="text-[9px] tracking-[0.4em] font-light text-slate-400 uppercase">Knowledge Portal // Ehime Univ. Museum</p>
        </div>
    </footer>

    <script src="index.js" defer></script>
</body>
</html>
