<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愛媛大学ミュージアム 宇宙ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: #e2e8f0;
            background-color: #050510; /* 深淵の宇宙空間ベース色 */
            overflow: hidden; /* スクロールを原則禁止 */
        }
        
        /* --- 遠近感を生み出す宇宙の背景アニメーション --- */
        @keyframes cosmicFlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.1) translate(3%, 3%); opacity: 0.5; }
            100% { transform: scale(1) translate(0, 0); opacity: 0.3; }
        }

        @keyframes deepAbyss {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* 遠景：不思議な星雲の光 */
        .nebula-layer {
            position: fixed;
            inset: -50%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(88, 28, 135, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(2, 66, 82, 0.4) 0%, transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(15, 23, 42, 0.8) 0%, transparent 60%);
            z-index: -30;
            animation: deepAbyss 40s linear infinite;
            pointer-events: none;
        }

        /* 中景：星屑（SVGノイズで遠くの銀河を表現） */
        .star-dust {
            position: fixed;
            inset: 0;
            z-index: -20;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.3"/%3E%3C/svg%3E');
            mix-blend-mode: color-dodge;
            opacity: 0.15;
            pointer-events: none;
        }

        /* --- ダーク・グラスモーフィズムのカード --- */
        .cosmic-card {
            position: relative;
            overflow: hidden;
            background: rgba(15, 20, 35, 0.4); /* 深い闇の半透明 */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15); /* 微かなエッジ光 */
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px; /* 少し角を落とす */
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.6), /* 強い浮遊感を生む影 */
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* カード内部を漂う微小なエネルギーの波 */
        .cosmic-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            animation: cosmicFlow 10s infinite alternate ease-in-out;
            pointer-events: none;
        }
        
        .cosmic-card:active {
            transform: translateY(2px) scale(0.97);
            background: rgba(20, 25, 45, 0.6);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* --- 暗闇で発光するプラズマコア（アイコン） --- */
        .plasma-sphere {
            position: relative;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* アイコン自体の色を使って周囲を照らすグロウ効果 */
            box-shadow: 
                0 0 15px currentColor,
                inset 0 2px 5px rgba(255, 255, 255, 0.6),
                inset 0 -5px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        /* ガラスの鋭いハイライト */
        .plasma-sphere::after {
            content: '';
            position: absolute;
            top: 8%; left: 15%; width: 35%; height: 35%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, transparent 100%);
            border-radius: 50%;
            filter: blur(1px);
        }

        .group:hover .plasma-sphere {
            transform: scale(1.08);
            filter: brightness(1.2);
        }

        /* アイコンの強い発光 */
        .icon-glow {
            filter: drop-shadow(0 0 6px white) drop-shadow(0 0 12px currentColor);
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center p-4 landscape:py-4 landscape:px-8 relative">

    <!-- 遠近感を生む宇宙の背景レイヤー -->
    <div class="nebula-layer"></div>
    <div class="star-dust"></div>

    <!-- Header Area -->
    <header class="w-full max-w-md landscape:max-w-4xl text-center mb-6 mt-2 relative z-10">
        <div class="mb-2 flex justify-center items-center gap-3 opacity-80">
            <span class="h-[1px] w-8 bg-gradient-to-r from-transparent to-blue-400"></span>
            <span class="text-[9px] font-bold text-blue-300 tracking-[0.3em] uppercase">Ehime University Museum</span>
            <span class="h-[1px] w-8 bg-gradient-to-l from-transparent to-blue-400"></span>
        </div>
        <h1 class="text-xl md:text-2xl font-bold tracking-widest text-white drop-shadow-lg">ミュージアム・ゲートウェイ</h1>
        <p class="text-[10px] md:text-[11px] mt-1 font-light text-slate-400 tracking-wider">果てしなき知の探求、その入り口。</p>
    </header>

    <!-- Main Grid (Portrait: 2x4, Landscape: 4x2) -->
    <main class="w-full max-w-md landscape:max-w-4xl grid grid-cols-2 landscape:grid-cols-4 gap-3 relative z-10 flex-grow">
        
        <!-- 1. 愛媛大学ミュージアム -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-yellow-400">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-yellow-400 to-yellow-600 mb-2">
                <svg viewBox="0 0 100 100" class="w-10 h-10 text-white icon-glow" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 10,18 Q 30,38 52,38" />
                    <path d="M 10,38 Q 28,56 48,56" />
                    <path d="M 52,49 L 57,41 L 62,48 L 71,32 L 78,40 L 88,27" />
                    <path d="M 10,58 C 30,84 68,84 88,56" />
                </svg>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">愛媛大学<br>ミュージアム</span>
        </a>

        <!-- 2. えひめ連携企業紹介 -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-cyan-400">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-cyan-500 to-cyan-700 mb-2">
                <i data-lucide="handshake" class="w-7 h-7 text-white icon-glow"></i>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">えひめ連携企業紹介</span>
        </a>

        <!-- 3. 愛媛大学修学支援システム -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-blue-500">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-800 mb-2">
                <i data-lucide="graduation-cap" class="w-7 h-7 text-white icon-glow"></i>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">修学支援<br>システム</span>
        </a>

        <!-- 4. 愛媛大学生協サイト -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-orange-500">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-orange-500 to-orange-700 mb-2">
                <i data-lucide="shopping-cart" class="w-7 h-7 text-white icon-glow"></i>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">大学生協<br>サイト</span>
        </a>

        <!-- 5. 愛媛大学の学生生活サポート -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-pink-500">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-pink-500 to-pink-700 mb-2">
                <i data-lucide="heart-handshake" class="w-7 h-7 text-white icon-glow"></i>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">学生生活<br>サポート</span>
        </a>

        <!-- 6. 松山ミュージアムストリート -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-emerald-400">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-emerald-500 to-emerald-800 mb-2">
                <i data-lucide="map-pin" class="w-7 h-7 text-white icon-glow"></i>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">松山ミュージアム<br>ストリート</span>
        </a>

        <!-- 7. イマジン・デッキ -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-amber-500">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-amber-500 to-amber-700 mb-2">
                <svg viewBox="5 5 90 90" class="w-10 h-10 text-white icon-glow" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="15,55 50,75 85,55 50,35" stroke-width="5" />
                    <line x1="50" y1="55" x2="82" y2="23" stroke-width="7" />
                    <circle cx="50" cy="55" r="7" fill="currentColor" stroke-width="0" />
                    <polygon points="86,18 63,18 86,41" fill="currentColor" stroke-width="1" />
                </svg>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">イマジン・デッキ</span>
        </a>

        <!-- 8. 問い合わせ先 -->
        <a href="#" class="cosmic-card p-4 flex flex-col items-center justify-center text-center group text-indigo-400">
            <div class="plasma-sphere w-14 h-14 bg-gradient-to-br from-indigo-500 to-indigo-800 mb-2">
                <i data-lucide="mail" class="w-7 h-7 text-white icon-glow"></i>
            </div>
            <span class="text-xs font-medium text-slate-200 leading-tight tracking-wide">問い合わせ先</span>
        </a>

    </main>

    <!-- Footer Area -->
    <footer class="mt-auto mb-2 text-center relative z-10">
        <div class="inline-block px-4 py-1.5 rounded-full bg-slate-900/50 border border-slate-700/50 backdrop-blur-md">
            <p class="text-[8px] tracking-[0.3em] font-light text-slate-400 uppercase">Knowledge Portal // Ehime Univ. Museum</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service worker registered.', reg))
                    .catch(err => console.log('Service worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
