<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えひめ連携企業紹介 | 愛媛大学ミュージアム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../index.css">
    <style>
        .back-button {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .back-button:hover {
            transform: translateX(-5px);
            color: #67e8f9; /* cyan-300 */
        }
    </style>
</head>
<body class="p-0 m-0 h-[100dvh] flex flex-col items-center relative overflow-hidden">

    <div class="nebula-layer"></div>
    <div class="star-dust"></div>

    <header class="w-full max-w-md px-4 text-center mb-6 mt-8 relative z-10 flex-shrink-0">
        <a href="/" class="back-button absolute left-4 top-0 text-slate-400 flex items-center gap-1 text-sm">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span>Portal</span>
        </a>
        <div class="flex justify-center items-center gap-3 mb-2 opacity-90">
            <span class="h-[1px] w-8 bg-gradient-to-r from-transparent to-[#b1a348]"></span>
            <span class="text-[10px] font-bold text-[#b1a348] tracking-[0.4em] uppercase">
                Ehime University Museum
            </span>
            <span class="h-[1px] w-8 bg-gradient-to-l from-transparent to-[#b1a348]"></span>
        </div>
        <h1 class="text-2xl font-bold text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">
            えひめ連携企業紹介
        </h1>
    </header>

    <main class="w-full max-w-lg px-6 relative z-10 flex-1 flex flex-col justify-center">
        <div class="cosmic-card p-8 flex flex-col items-center text-center">
            <div class="plasma-sphere bg-cyan-500/20 mb-6 w-20 h-20 flex items-center justify-center border-cyan-400/50" style="aspect-ratio: 1/1;">
                <i data-lucide="building-2" class="w-10 h-10 text-cyan-300 icon-glow"></i>
            </div>
            
            <h2 class="text-xl font-medium text-cyan-100 mb-4 tracking-tight">地元の知と、企業の力を結ぶ。</h2>
            
            <p class="text-sm text-slate-300 leading-relaxed mb-8">
                愛媛大学ミュージアムは、地域の企業と連携し、<br>
                新しい価値の創造と知の還元を目指しています。<br>
                連携企業の詳細については、現在準備中です。
            </p>

            <a href="/" class="px-8 py-3 rounded-full bg-white/5 border border-white/10 text-white text-sm tracking-widest hover:bg-white/10 transition-all backdrop-blur-sm">
                ポータルへ戻る
            </a>
        </div>
    </main>

    <footer class="mt-auto mb-6 text-center relative z-10 flex-shrink-0">
        <p class="text-[9px] tracking-[0.4em] font-light text-slate-500 uppercase">Ehime University Museum // Collaboration</p>
    </footer>

    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();
    </script>
</body>
</html>
