<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えひめ連携企業紹介 | 愛媛大学ミュージアム</title>
    <!-- Core UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Base styles from parent -->
    <link rel="stylesheet" href="../index.css">
    <!-- Page specific styles -->
    <link rel="stylesheet" href="index.css">

    <!-- SEO & Icons -->
    <link rel="canonical" href="https://museum-portal.moukaeritai.work/renkei/" />
</head>
<body class="p-0 m-0 h-[100dvh] flex flex-col items-center relative overflow-hidden bg-black text-slate-200">

    <!-- Background layers -->
    <div class="nebula-layer"></div>
    <div class="star-dust"></div>

    <!-- Header Section -->
    <header class="w-full max-w-md landscape:max-w-4xl sm:max-w-xl md:max-w-5xl px-4 text-center mt-4 sm:mt-6 mb-2 relative z-10 flex-shrink-0">
        <!-- Back Navigation -->
        <a href="/" class="back-button absolute left-2 sm:left-4 top-0 text-slate-400 flex items-center gap-1 text-xs sm:text-sm">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            <span>Portal</span>
        </a>

        <!-- EHIME UNIVERSITY MUSEUM -->
        <div class="flex justify-center items-center gap-1 sm:gap-3 mb-1 sm:mb-2 opacity-90">
            <span class="h-[1px] w-6 sm:w-8 bg-gradient-to-r from-transparent to-[#b1a348]"></span>
            <span class="text-[9px] sm:text-[11px] font-bold text-[#b1a348] tracking-[0.2em] sm:tracking-[0.4em] uppercase drop-shadow-[0_0_8px_rgba(177,163,72,0.4)]">
                Ehime University Museum
            </span>
            <span class="h-[1px] w-6 sm:w-8 bg-gradient-to-l from-transparent to-[#b1a348]"></span>
        </div>

        <h1 class="text-lg sm:text-2xl font-bold tracking-normal sm:tracking-[0.1em] whitespace-nowrap text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">
            えひめ連携企業紹介
        </h1>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-md landscape:max-w-4xl sm:max-w-xl md:max-w-5xl px-4 sm:px-6 relative z-10 flex-1 flex flex-col min-h-0">
        <!-- Sticky Navigation Area -->
        <nav id="tab-navigation" class="flex overflow-x-auto gap-2 py-2 mb-2 sm:mb-4 no-scrollbar">
            <!-- Tabs injected by JS -->
        </nav>

        <!-- Dynamic Content Area -->
        <section id="tab-content" class="flex-1 min-h-0 overflow-hidden mb-2 sm:mb-4">
            <!-- Content injected by JS -->
        </section>
    </main>

    <!-- Footer Area matching index.html -->
    <footer class="mt-auto mb-2 sm:mb-4 text-center relative z-10 flex-shrink-0 select-none">
        <div class="inline-block py-1 px-4 rounded-full bg-slate-900/50 border border-slate-700/50 backdrop-blur-md">
            <p class="text-[8px] sm:text-[9px] tracking-[0.3em] font-light text-slate-500 uppercase">Knowledge Portal // Ehime Univ. Museum // Collaboration</p>
        </div>
    </footer>

    <!-- Page Logic -->
    <script src="index.js" defer></script>
</body>
</html>
