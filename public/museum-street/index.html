<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松山ミュージアムストリート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <link rel="canonical" href="https://museum-portal.moukaeritai.work/museum-street/" />
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="/__/firebase/8.10.1/firebase-app.js"></script>
    <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/init.js"></script>
</head>
<body class="text-slate-200">

    <div class="nebula-layer"></div>
    <div class="star-dust"></div>

    <header class="w-full text-center py-6 px-4 relative z-10 flex-shrink-0">
         <a href="/" class="absolute top-1/2 -translate-y-1/2 left-4 p-2 rounded-full cosmic-card text-slate-300 hover:text-white transition-colors duration-300 z-20">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-2xl md:text-3xl font-bold tracking-widest text-white drop-shadow-lg">松山ミュージアムストリート</h1>
        <p class="text-sm md:text-base mt-2 font-light text-slate-400 tracking-wider">知的好奇心を満たす、文化と歴史の散歩道</p>
    </header>

    <div class="flex-grow flex w-full max-w-screen-2xl mx-auto px-4 pb-4 gap-4 z-10 min-h-0">
        
        <nav class="w-1/3 xl:w-1/4 space-y-2 overflow-y-auto pr-2" id="museum-nav">
            <a href="#" data-page="1" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">愛媛県美術館</h2>
                    <p class="text-xs text-slate-400">多彩な企画展とコレクション</p>
                </div>
            </a>
            <a href="#" data-page="2" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">萬翠荘</h2>
                    <p class="text-xs text-slate-400">大正ロマンの香るフランス邸宅</p>
                </div>
            </a>
            <a href="#" data-page="3" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">坂の上の雲ミュージアム</h2>
                    <p class="text-xs text-slate-400">松山の近代化の物語</p>
                </div>
            </a>
            <a href="#" data-page="4" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">子規記念博物館</h2>
                    <p class="text-xs text-slate-400">正岡子規の生涯と文学</p>
                </div>
            </a>
            <a href="#" data-page="5" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">道後公園 湯築城跡</h2>
                    <p class="text-xs text-slate-400">中世の城跡を散策</p>
                </div>
            </a>
            <a href="#" data-page="6" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">ミウラート・ヴィレッジ</h2>
                    <p class="text-xs text-slate-400">三浦美術館の愛称</p>
                </div>
            </a>
            <a href="#" data-page="7" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">セキ美術館</h2>
                    <p class="text-xs text-slate-400">近代日本洋画とガラス作品</p>
                </div>
            </a>
            <a href="#" data-page="8" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">秋山兄弟生誕地</h2>
                    <p class="text-xs text-slate-400">日露戦争で活躍した兄弟の軌跡</p>
                </div>
            </a>
            <a href="#" data-page="9" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">二之丸史跡庭園</h2>
                    <p class="text-xs text-slate-400">恋人の聖地、安らぎの庭園</p>
                </div>
            </a>
            <a href="#" data-page="10" class="museum-item cosmic-card p-2 flex items-center gap-3 group">
                <div class="plasma-sphere w-10 h-10 flex-shrink-0"></div>
                <div>
                    <h2 class="text-sm font-bold text-slate-100">愛媛大学ミュージアム</h2>
                    <p class="text-xs text-slate-400">大学の知を結集した博物館</p>
                </div>
            </a>
        </nav>

        <main class="w-2/3 xl:w-3/4 flex flex-col">
            <div class="cosmic-card flex-grow p-1">
                <iframe id="content-frame" class="w-full h-full bg-transparent" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
            </div>
        </main>

    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const navContainer = document.getElementById('museum-nav');
            
            // まずはローカルのキャッシュ（すでにIndexedDBに保存されているはず）から取得して表示
            db.collection("museumIcons").get({ source: 'cache' }).then((querySnapshot) => {
                if (!querySnapshot.empty) {
                    renderIcons(querySnapshot);
                }
            }).catch((error) => {
                console.log("Error getting cached documents:", error);
            });

            // バックグラウンドで最新のデータを取得して更新
            db.collection("museumIcons").get({ source: 'server' }).then((querySnapshot) => {
                if (!querySnapshot.empty) {
                    renderIcons(querySnapshot);
                }
            }).catch((error) => {
                console.error("Error fetching museum icons from server:", error);
            });

            function renderIcons(querySnapshot) {
                const defaultColors = {
                    "1": "#235633",  // 県美
                    "2": "#a97f71",  // 萬翠荘
                    "3": "#7bc6fa",  // 坂雲
                    "4": "#7c4846",  // 子規記念博物館
                    "5": "#d58e53",  // 湯築城
                    "6": "#a6373e",  // 三浦アート
                    "7": "#e5d6cd",  // セキ美術館
                    "8": "#fba9ab",  // 秋山兄弟
                    "9": "#1c2d70",  // 二之丸史跡
                    "10": "#aea356" // 愛媛大学ミュ
                };

                querySnapshot.forEach((doc) => {
                    const iconData = doc.data();
                    const docId = doc.id;
                    
                    const existingLink = navContainer.querySelector(`[data-page="${docId}"]`);
                    
                    if (existingLink) {
                        const iconContainer = existingLink.querySelector('.plasma-sphere');
                        if (iconContainer) {
                            if (iconData.svgContent) {
                                iconContainer.innerHTML = iconData.svgContent;
                            }
                            
                            const bgColorHex = iconData.backgroundColor || defaultColors[docId];
                            iconContainer.className = 'plasma-sphere w-10 h-10 flex-shrink-0'; 
                            iconContainer.style.backgroundColor = '#' + bgColorHex.replace('#', ''); 
                        }
                    }
                });
                
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            }
        });
    </script>
</body>
</html>
