                    </button>
                    <div class="flex flex-col min-w-0">
                        <h1 class="text-sm font-bold text-white tracking-wider whitespace-nowrap overflow-hidden text-ellipsis">松山ミュージアムストリート</h1>
                        <p class="text-[10px] text-slate-400 whitespace-nowrap overflow-hidden text-ellipsis">知的好奇心を満たす散歩道</p>
                    </div>

                <a href="/" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-300 hover:text-white bg-slate-800/80 flex-shrink-0 ml-2">

            </div>

            <!-- Content Area -->

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const navContainer = document.getElementById('museum-nav');
            
            db.collection("museumIcons").get({ source: 'cache' }).then((querySnapshot) => {
                if (!querySnapshot.empty) {
                    renderIcons(querySnapshot);
                }
            }).catch((error) => {});

            db.collection("museumIcons").get({ source: 'server' }).then((querySnapshot) => {
                if (!querySnapshot.empty) {
                    renderIcons(querySnapshot);
                }
            }).catch((error) => {});

            function renderIcons(querySnapshot) {
                const defaultColors = {
                    "1": "#235633", "2": "#a97f71", "3": "#7bc6fa", "4": "#7c4846", "5": "#d58e53",
                    "6": "#a6373e", "7": "#e5d6cd", "8": "#fba9ab", "9": "#1c2d70", "10": "#aea356"
                };

                querySnapshot.forEach((doc) => {
                    const iconData = doc.data();
                    const docId = doc.id;
                    const existingLink = navContainer.querySelector(`[data-page="${docId}"]`);
                    if (existingLink) {
                        const iconContainer = existingLink.querySelector('.plasma-sphere');
                        if (iconContainer) {
                            if (iconData.svgContent) iconContainer.innerHTML = iconData.svgContent;
                            const bgColorHex = iconData.backgroundColor || defaultColors[docId];
                            iconContainer.className = 'plasma-sphere w-10 h-10 flex-shrink-0'; 
                            iconContainer.style.backgroundColor = '#' + bgColorHex.replace('#', ''); 
                        }
                    }
                });
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        });
    </script>
</body>
</html>
