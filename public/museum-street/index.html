<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松山ミュージアムストリート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <link rel="canonical" href="https://museum-portal.moukaeritai.work/museum-street/" />
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="/__/firebase/8.10.1/firebase-app.js"></script>
    <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/init.js"></script>
</head>
<body class="text-slate-200">

    <div class="nebula-layer"></div>
    <div class="star-dust"></div>

    <header class="w-full text-center py-6 px-4 relative z-10 flex-shrink-0">
         <a href="/" class="absolute top-1/2 -translate-y-1/2 left-4 p-2 rounded-full cosmic-card text-slate-300 hover:text-white transition-colors duration-300 z-20">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-2xl md:text-3xl font-bold tracking-widest text-white drop-shadow-lg">松山ミュージアムストリート</h1>
        <p class="text-sm md:text-base mt-2 font-light text-slate-400 tracking-wider">知的好奇心を満たす、文化と歴史の散歩道</p>
    </header>

    <div class="flex-grow flex w-full max-w-screen-2xl mx-auto px-4 pb-4 gap-4 z-10 min-h-0">
        
        <nav class="w-1/3 xl:w-1/4 space-y-3 overflow-y-auto pr-2" id="museum-nav">
            <!-- リンクはFirestoreから動的に生成されます -->
        </nav>

        <main class="w-2/3 xl:w-3/4 flex flex-col">
            <div class="cosmic-card flex-grow p-1">
                <iframe id="content-frame" class="w-full h-full bg-transparent" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
            </div>
        </main>

    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const navContainer = document.getElementById('museum-nav');
            
            const museumNames = {
                "1": "愛媛県美術館",
                "2": "萬翠荘",
                "3": "坂の上の雲ミュージアム",
                "4": "子規記念博物館",
                "5": "道後公園 湯築城跡",
                "6": "ミウラート・ヴィレッジ",
                "7": "セキ美術館",
                "8": "秋山兄弟生誕地",
                "9": "二之丸史跡庭園",
                "10": "愛媛大学ミュージアム"
            };

            const defaultColors = {
                "1": "#3b82f6", "2": "#8b5cf6", "3": "#0ea5e9", "4": "#22c55e", "5": "#84cc16", "6": "#f97316", "7": "#ef4444", "8": "#eab308", "9": "#14b8a6", "10": "#6366f1"
            };

            // Firestoreからアイコンデータを取得
            db.collection("museumIcons").get().then((querySnapshot) => {
                if (!querySnapshot.empty) {
                    const docs = querySnapshot.docs.sort((a, b) => parseInt(a.id, 10) - parseInt(b.id, 10));
                    
                    docs.forEach((doc) => {
                        const iconData = doc.data();
                        const docId = doc.id;
                        const museumName = museumNames[docId] || "不明な施設";
                        
                        // 既存のナビゲーションアイテムを探す (あれば)
                        const existingLink = navContainer.querySelector(`[data-page="${docId}"]`);
                        
                        if (existingLink) {
                            // FirestoreにSVGデータがあれば置換
                            if (iconData.svgContent) {
                                const iconContainer = existingLink.querySelector('.plasma-sphere');
                                if (iconContainer) {
                                    // 既存のクラスを保持しつつ、色を更新する
                                    const bgColorHex = iconData.backgroundColor || defaultColors[docId].replace('#', '');
                                    iconContainer.className = `plasma-sphere w-12 h-12 flex-shrink-0 mb-2`; // 既存のグラデーションクラスを削除
                                    iconContainer.style.backgroundColor = '#' + bgColorHex;
                                    iconContainer.innerHTML = iconData.svgContent;
                                }
                            }
                        }
                    });
                    
                    // Lucideアイコンを再描画 (FirestoreからのSVGにlucideクラスが含まれている場合を考慮)
                    if (typeof lucide !== 'undefined') {
                        lucide.createIcons();
                    }
                }
            }).catch((error) => {
                console.error("Error fetching museum icons:", error);
            });
        });
    </script>
</body>
</html>
