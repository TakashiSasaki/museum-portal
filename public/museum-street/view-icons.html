<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイコン一覧 | ミュージアムストリート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f2f5;
        }
        .icon-wrapper {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .icon-wrapper:hover {
            transform: scale(1.05);
        }
        .icon-selected {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.7);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-100 pb-[400px]">

    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">登録アイコン一覧</h1>
                <p class="text-gray-600">アイコンをクリックするとSVGコードが表示されます。</p>
            </div>
            <div id="auth-container">
                <!-- ログイン/ログアウトボタンがここに表示されます -->
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-sm transition-colors" style="display:none;">ログイン</button>
                <button id="logout-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded text-sm transition-colors" style="display:none;">ログアウト</button>
            </div>
        </header>

        <div id="icon-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-x-6 gap-y-8">
            <!-- アイコンはここに動的に読み込まれます -->
        </div>

        <!-- SVGコード表示・編集エリア -->
        <div id="code-display-container" class="fixed bottom-0 left-0 right-0 bg-gray-900 text-white p-4 shadow-lg transform translate-y-full transition-transform duration-300 ease-in-out" style="z-index: 100;">
            <div class="container mx-auto flex flex-col h-[300px]">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-bold text-gray-200">
                        選択されたアイコンのコード: <span id="selected-icon-id" class="text-blue-400"></span>
                    </h2>
                    <div class="flex gap-2">
                        <button id="save-button" class="bg-green-600 hover:bg-green-700 text-white font-bold py-1 px-4 rounded text-sm transition-colors" style="display: none;">保存</button>
                        <button id="copy-button" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-1 px-4 rounded text-sm transition-colors">コピー</button>
                        <button id="close-code-button" class="bg-red-600 hover:bg-red-700 text-white font-bold py-1 px-4 rounded text-sm transition-colors">閉じる</button>
                    </div>
                </div>
                <div class="flex-grow">
                    <!-- codeタグからtextareaに変更し、編集可能にする -->
                    <textarea id="code-output" class="w-full h-full bg-gray-800 text-green-300 p-2 rounded border border-gray-700 font-mono text-sm resize-none focus:outline-none focus:border-blue-500" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="/__/firebase/8.10.1/firebase-app.js"></script>
    <script src="/__/firebase/8.10.1/firebase-auth.js"></script>
    <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/init.js"></script>

    <script>
        const museumNames = {
            "1": "愛媛県美術館",
            "2": "萬翠荘",
            "3": "坂の上の雲ミュージアム",
            "4": "子規記念博物館",
            "5": "道後公園 湯築城跡",
            "6": "ミウラート・ヴィレッジ",
            "7": "セキ美術館",
            "8": "秋山兄弟生誕地",
            "9": "二之丸史跡庭園",
            "10": "愛媛大学ミュージアム"
        };

        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const auth = firebase.auth();
            
            const iconContainer = document.getElementById('icon-container');
            const codeDisplayContainer = document.getElementById('code-display-container');
            const codeOutput = document.getElementById('code-output');
            const copyButton = document.getElementById('copy-button');
            const closeCodeButton = document.getElementById('close-code-button');
            const saveButton = document.getElementById('save-button');
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const selectedIconIdSpan = document.getElementById('selected-icon-id');

            let currentSelectedId = null;
            let isUserLoggedIn = false;

            // 認証状態の監視
            auth.onAuthStateChanged((user) => {
                if (user) {
                    isUserLoggedIn = true;
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'block';
                    codeOutput.readOnly = false; // 編集可能に
                    saveButton.style.display = 'block'; // 保存ボタン表示
                } else {
                    isUserLoggedIn = false;
                    loginBtn.style.display = 'block';
                    logoutBtn.style.display = 'none';
                    codeOutput.readOnly = true; // 読み取り専用に
                    saveButton.style.display = 'none'; // 保存ボタン非表示
                }
            });

            // ログイン処理 (Email/Passwordを使用すると仮定)
            loginBtn.addEventListener('click', () => {
                const email = prompt("管理者のメールアドレスを入力してください:");
                if (!email) return;
                const password = prompt("パスワードを入力してください:");
                if (!password) return;

                auth.signInWithEmailAndPassword(email, password)
                    .then(() => {
                        alert("ログインに成功しました。アイコンの編集が可能です。");
                    })
                    .catch((error) => {
                        console.error("Login failed:", error);
                        alert("ログインに失敗しました: " + error.message);
                    });
            });

            // ログアウト処理
            logoutBtn.addEventListener('click', () => {
                auth.signOut().then(() => {
                    alert("ログアウトしました。");
                }).catch((error) => {
                    console.error("Logout error", error);
                });
            });

            // アイコン一覧の取得と描画
            const loadIcons = () => {
                iconContainer.innerHTML = ''; // クリア
                db.collection("museumIcons").get().then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        iconContainer.innerHTML = '<p class="text-gray-500 col-span-full">アイコンが見つかりませんでした。</p>';
                        return;
                    }
                    
                    // 取得したドキュメントを配列に格納し、IDの数値順にソートする
                    const docs = [];
                    querySnapshot.forEach((doc) => {
                        docs.push(doc);
                    });
                    
                    docs.sort((a, b) => {
                        const idA = parseInt(a.id, 10);
                        const idB = parseInt(b.id, 10);
                        return idA - idB;
                    });

                    docs.forEach((doc) => {
                        const iconData = doc.data();
                        const svgContent = iconData.svgContent || '';
                        const docId = doc.id;
                        const museumName = museumNames[docId] || "不明な施設";

                        const iconWrapper = document.createElement('div');
                        iconWrapper.className = 'icon-wrapper flex flex-col items-center justify-center p-4 bg-white rounded-lg shadow-md cursor-pointer';
                        iconWrapper.dataset.id = docId;

                        const iconDisplay = document.createElement('div');
                        iconDisplay.className = 'flex items-center justify-center w-full max-w-[80px] aspect-square mb-3';
                        iconDisplay.innerHTML = svgContent;

                        const iconIdText = document.createElement('p');
                        iconIdText.className = 'text-xs font-semibold text-gray-700 text-center break-words w-full';
                        iconIdText.innerHTML = `ID: ${docId}<br><span class="text-xs text-gray-500">${museumName}</span>`;

                        iconWrapper.appendChild(iconDisplay);
                        iconWrapper.appendChild(iconIdText);
                        iconContainer.appendChild(iconWrapper);

                        // アイコンクリック時の処理
                        iconWrapper.addEventListener('click', () => {
                            document.querySelectorAll('.icon-wrapper.icon-selected').forEach(el => el.classList.remove('icon-selected'));
                            iconWrapper.classList.add('icon-selected');
                            
                            currentSelectedId = docId;
                            selectedIconIdSpan.textContent = `ID: ${docId} (${museumName})`;
                            codeOutput.value = svgContent;
                            codeDisplayContainer.classList.remove('translate-y-full');
                            copyButton.textContent = 'コピー';
                        });
                    });

                }).catch((error) => {
                    console.error("Error getting documents: ", error);
                    iconContainer.innerHTML = `<p class="text-red-500 col-span-full">アイコンの読み込みに失敗しました。</p>`;
                });
            };

            loadIcons(); // 初期読み込み
            
            // 閉じるボタン
            closeCodeButton.addEventListener('click', () => {
                codeDisplayContainer.classList.add('translate-y-full');
                document.querySelectorAll('.icon-wrapper.icon-selected').forEach(el => el.classList.remove('icon-selected'));
                currentSelectedId = null;
            });

            // コピーボタン
            copyButton.addEventListener('click', () => {
                navigator.clipboard.writeText(codeOutput.value).then(() => {
                    copyButton.textContent = 'コピー完了!';
                    setTimeout(() => { copyButton.textContent = 'コピー'; }, 1500);
                });
            });

            // 保存ボタンの処理
            saveButton.addEventListener('click', () => {
                if (!currentSelectedId) return;
                
                const newSvgContent = codeOutput.value;
                const originalText = saveButton.textContent;
                saveButton.textContent = '保存中...';
                saveButton.disabled = true;

                db.collection("museumIcons").doc(currentSelectedId).update({
                    svgContent: newSvgContent
                })
                .then(() => {
                    saveButton.textContent = '保存しました!';
                    saveButton.classList.replace('bg-green-600', 'bg-blue-600');
                    
                    // 一覧の該当アイコンの表示を更新する
                    const updatedWrapper = document.querySelector(`.icon-wrapper[data-id="${currentSelectedId}"]`);
                    if (updatedWrapper) {
                        const displayDiv = updatedWrapper.querySelector('div');
                        if (displayDiv) {
                            displayDiv.innerHTML = newSvgContent;
                        }
                    }

                    setTimeout(() => { 
                        saveButton.textContent = originalText; 
                        saveButton.disabled = false;
                        saveButton.classList.replace('bg-blue-600', 'bg-green-600');
                    }, 2000);
                })
                .catch((error) => {
                    console.error("Error updating document: ", error);
                    alert("保存に失敗しました。権限があるか確認してください。");
                    saveButton.textContent = originalText;
                    saveButton.disabled = false;
                });
            });

        });
    </script>

</body>
</html>
