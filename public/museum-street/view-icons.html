<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイコン一覧 | ミュージアムストリート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f2f5;
        }
        .icon-wrapper {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .icon-wrapper:hover {
            transform: scale(1.05);
        }
        .icon-selected {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.7);
            transform: scale(1.05);
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 1px solid #4a5568;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 pb-[400px]">

    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">登録アイコン一覧</h1>
                <p class="text-gray-600">アイコンをクリックするとSVGコードと背景色を編集できます。</p>
            </div>
        </header>

        <div id="icon-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-x-6 gap-y-8">
            <!-- アイコンはここに動的に読み込まれます -->
        </div>

        <!-- SVGコード・背景色 表示・編集エリア -->
        <div id="code-display-container" class="fixed bottom-0 left-0 right-0 bg-gray-900 text-white p-4 shadow-lg transform translate-y-full transition-transform duration-300 ease-in-out" style="z-index: 100;">
            <div class="container mx-auto flex flex-col h-[300px]">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-bold text-gray-200">
                        編集中のアイコン: <span id="selected-icon-id" class="text-blue-400"></span>
                    </h2>
                    <div class="flex items-center gap-2">
                        <label for="color-picker" class="text-sm text-gray-400">背景色:</label>
                        <input type="color" id="color-picker" title="カラーピッカーで選択">
                        <span class="text-gray-500">#</span><input type="text" id="hex-input" class="bg-gray-700 text-white w-20 p-1 rounded text-sm font-mono" placeholder="RRGGBB">
                        <button id="save-button" class="bg-green-600 hover:bg-green-700 text-white font-bold py-1 px-4 rounded text-sm transition-colors">保存</button>
                        <button id="copy-button" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-1 px-4 rounded text-sm transition-colors">コードコピー</button>
                        <button id="close-code-button" class="bg-red-600 hover:bg-red-700 text-white font-bold py-1 px-4 rounded text-sm transition-colors">閉じる</button>
                    </div>
                </div>
                <div class="flex-grow">
                    <textarea id="code-output" class="w-full h-full bg-gray-800 text-green-300 p-2 rounded border border-gray-700 font-mono text-sm resize-none focus:outline-none focus:border-blue-500"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="/__/firebase/8.10.1/firebase-app.js"></script>
    <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/init.js"></script>

    <script>
        const museumNames = {
            "1": "愛媛県美術館", "2": "萬翠荘", "3": "坂の上の雲ミュージアム", "4": "子規記念博物館", "5": "道後公園 湯築城跡", "6": "ミウラート・ヴィレッジ", "7": "セキ美術館", "8": "秋山兄弟生誕地", "9": "二之丸史跡庭園", "10": "愛媛大学ミュージアム"
        };
        // Firestoreに保存する形式に合わせて、#なしの16進数で定義
        const defaultColors = {
            "1": "3b82f6", "2": "8b5cf6", "3": "0ea5e9", "4": "22c55e", "5": "84cc16", "6": "f97316", "7": "ef4444", "8": "eab308", "9": "14b8a6", "10": "6366f1"
        };

        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            
            const iconContainer = document.getElementById('icon-container');
            const codeDisplayContainer = document.getElementById('code-display-container');
            const codeOutput = document.getElementById('code-output');
            const copyButton = document.getElementById('copy-button');
            const closeCodeButton = document.getElementById('close-code-button');
            const saveButton = document.getElementById('save-button');
            const selectedIconIdSpan = document.getElementById('selected-icon-id');
            const colorPicker = document.getElementById('color-picker');
            const hexInput = document.getElementById('hex-input');

            let currentSelectedId = null;

            const loadIcons = () => {
                iconContainer.innerHTML = '';
                db.collection("museumIcons").get().then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        iconContainer.innerHTML = '<p class="text-gray-500 col-span-full">アイコンが見つかりませんでした。</p>';
                        return;
                    }
                    
                    const docs = querySnapshot.docs.sort((a, b) => parseInt(a.id, 10) - parseInt(b.id, 10));

                    docs.forEach((doc) => {
                        const iconData = doc.data();
                        const svgContent = iconData.svgContent || '';
                        const docId = doc.id;
                        const museumName = museumNames[docId] || "不明な施設";
                        // Firestoreからは # なしの値が来ることを想定
                        const bgColorHex = iconData.backgroundColor || defaultColors[docId] || 'ffffff';

                        const iconWrapper = document.createElement('div');
                        iconWrapper.className = 'icon-wrapper flex flex-col items-center p-4 bg-white rounded-lg shadow-md cursor-pointer';
                        iconWrapper.dataset.id = docId;

                        const iconDisplay = document.createElement('div');
                        iconDisplay.className = 'icon-display flex items-center justify-center w-full max-w-[80px] aspect-square mb-3 rounded-md';
                        iconDisplay.style.backgroundColor = '#' + bgColorHex; // CSSで使うときは # を付ける
                        iconDisplay.innerHTML = svgContent;

                        const iconIdText = document.createElement('p');
                        iconIdText.className = 'text-xs font-semibold text-gray-700 text-center break-words w-full';
                        iconIdText.innerHTML = `ID: ${docId}<br><span class="text-xs text-gray-500">${museumName}</span>`;

                        iconWrapper.appendChild(iconDisplay);
                        iconWrapper.appendChild(iconIdText);
                        iconContainer.appendChild(iconWrapper);

                        iconWrapper.addEventListener('click', () => {
                            document.querySelectorAll('.icon-wrapper.icon-selected').forEach(el => el.classList.remove('icon-selected'));
                            iconWrapper.classList.add('icon-selected');
                            
                            currentSelectedId = docId;
                            selectedIconIdSpan.textContent = `ID: ${docId}`;
                            codeOutput.value = svgContent;
                            colorPicker.value = '#' + bgColorHex; // カラーピッカーには # 付きで設定
                            hexInput.value = bgColorHex;      // テキストボックスには # なしで設定
                            codeDisplayContainer.classList.remove('translate-y-full');
                            copyButton.textContent = 'コードコピー';
                        });
                    });
                });
            };

            loadIcons();
            
            // カラーピッカーの変更をテキストボックスとプレビューに反映
            colorPicker.addEventListener('input', () => {
                const newColor = colorPicker.value;
                const hex = newColor.substring(1);
                hexInput.value = hex;

                if (!currentSelectedId) return;
                const selectedWrapper = document.querySelector(`.icon-wrapper[data-id="${currentSelectedId}"]`);
                if (selectedWrapper) {
                    const display = selectedWrapper.querySelector('.icon-display');
                    if(display) display.style.backgroundColor = newColor;
                }
            });

            // テキストボックスの変更をカラーピッカーとプレビューに反映
            hexInput.addEventListener('input', () => {
                const hex = hexInput.value.replace(/[^0-9a-fA-F]/g, '');
                hexInput.value = hex;
                if (hex.length === 6) {
                    const newColor = '#' + hex;
                    colorPicker.value = newColor;
                    if (!currentSelectedId) return;
                    const selectedWrapper = document.querySelector(`.icon-wrapper[data-id="${currentSelectedId}"]`);
                    if (selectedWrapper) {
                        const display = selectedWrapper.querySelector('.icon-display');
                        if(display) display.style.backgroundColor = newColor;
                    }
                }
            });

            closeCodeButton.addEventListener('click', () => {
                codeDisplayContainer.classList.add('translate-y-full');
                document.querySelectorAll('.icon-wrapper.icon-selected').forEach(el => el.classList.remove('icon-selected'));
                currentSelectedId = null;
            });

            copyButton.addEventListener('click', () => {
                navigator.clipboard.writeText(codeOutput.value).then(() => {
                    copyButton.textContent = 'コピー完了!';
                    setTimeout(() => { copyButton.textContent = 'コードコピー'; }, 1500);
                });
            });

            saveButton.addEventListener('click', () => {
                if (!currentSelectedId) return;
                
                const newSvgContent = codeOutput.value;
                const newBgColorHex = hexInput.value.replace(/#/g, '');
                
                saveButton.textContent = '保存中...';
                saveButton.disabled = true;

                db.collection("museumIcons").doc(currentSelectedId).update({
                    svgContent: newSvgContent,
                    backgroundColor: newBgColorHex
                })
                .then(() => {
                    saveButton.textContent = '保存しました!';
                    saveButton.classList.replace('bg-green-600', 'bg-blue-600');
                    
                    // 変更を反映させるために、アイコンリストを再読み込みする
                    loadIcons();

                    setTimeout(() => { 
                        saveButton.textContent = '保存'; 
                        saveButton.disabled = false;
                        saveButton.classList.replace('bg-blue-600', 'bg-green-600');
                    }, 2000);
                })
                .catch((error) => {
                    console.error("Error updating document: ", error);
                    alert("保存に失敗しました。詳細をコンソールで確認してください。");
                    saveButton.textContent = '保存';
                    saveButton.disabled = false;
                });
            });
        });
    </script>

</body>
</html>
