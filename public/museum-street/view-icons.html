<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum Icons Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="/__/firebase/8.10.1/firebase-app.js"></script>
    <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/init.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Museum Icons Viewer</h1>
        <div id="icons-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Icons will be loaded here -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const container = document.getElementById('icons-container');

            const defaultColors = {
                "1": "#235633",  // 県美
                "2": "#a97f71",  // 萬翠荘
                "3": "#7bc6fa",  // 坂雲
                "4": "#7c4846",  // 子規記念博物館
                "5": "#d58e53",  // 湯築城
                "6": "#a6373e",  // 三浦アート
                "7": "#e5d6cd",  // セキ美術館
                "8": "#fba9ab",  // 秋山兄弟
                "9": "#1c2d70",  // 二之丸史跡
                "10": "#aea356"  // 愛媛大学ミュ
            };

            const museumNames = {
                "1": "愛媛県美術館",
                "2": "萬翠荘",
                "3": "坂の上の雲ミュージアム",
                "4": "子規記念博物館",
                "5": "道後公園 湯築城跡",
                "6": "ミウラート・ヴィレッジ",
                "7": "セキ美術館",
                "8": "秋山兄弟生誕地",
                "9": "二之丸史跡庭園",
                "10": "愛媛大学ミュージアム"
            };

            // Fetch from cache first, then server
            const fetchIcons = (source) => {
                db.collection("museumIcons").get({ source }).then((querySnapshot) => {
                    if (querySnapshot.empty && source === 'server') {
                         container.innerHTML = '<p class="text-gray-400 col-span-full">No icons found in Firestore. Make sure the collection \'museumIcons\' exists and has documents.</p>';
                        return;
                    }
                    render(querySnapshot);
                }).catch(error => {
                    if (source === 'server') {
                        console.error(`Error getting documents from ${source}:`, error);
                        container.innerHTML = `<p class="text-red-400 col-span-full">Error loading icons: ${error.message}</p>`;
                    }
                });
            }

            const loadedDocs = new Set();

            const render = (querySnapshot) => {
                 querySnapshot.forEach((doc) => {
                    if (loadedDocs.has(doc.id)) return;
                    
                    const iconData = doc.data();
                    const docId = doc.id;
                    loadedDocs.add(docId);

                    const bgColor = iconData.backgroundColor || defaultColors[docId] || '333333';
                    const textColor = iconData.textColor || 'FFFFFF';

                    const card = document.createElement('div');
                    card.className = 'bg-gray-800 rounded-lg p-4 flex flex-col items-center justify-center shadow-lg';

                    const iconWrapper = document.createElement('div');
                    iconWrapper.className = 'w-24 h-24 rounded-full flex items-center justify-center mb-4';
                    iconWrapper.style.backgroundColor = `#${bgColor.replace('#', '')}`;
                    iconWrapper.innerHTML = iconData.svgContent || '<span class="text-gray-500">No SVG</span>';

                    const name = document.createElement('h2');
                    name.className = 'text-lg font-semibold';
                    name.textContent = museumNames[docId] || `Museum ${docId}`;

                    const colorInfo = document.createElement('div');
                    colorInfo.className = 'text-sm text-gray-400 mt-2';
                    colorInfo.innerHTML = `BG: #${bgColor.replace('#','')} <br> Text: #${textColor.replace('#','')}`;
                    
                    card.appendChild(iconWrapper);
                    card.appendChild(name);
                    card.appendChild(colorInfo);

                    // To keep a consistent order, we replace or insert based on ID
                    const existingCard = container.querySelector(`[data-doc-id="${docId}"]`);
                    if(existingCard){
                         container.replaceChild(card, existingCard);
                    } else {
                         container.appendChild(card);
                    }
                    card.setAttribute('data-doc-id', docId);
                });
            }

            fetchIcons('cache');
            fetchIcons('server');
        });
    </script>
</body>
</html>
